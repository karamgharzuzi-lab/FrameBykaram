<!DOCTYPE html>
<html lang="en" dir="ltr" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frame by Karam | MirrorBooth Reservation</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#050505" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=Rubik:wght@300;400;600;700&family=Cairo:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="bg-[#121212] min-h-screen flex justify-center items-center sm:p-4">
  <div id="intro-overlay" class="intro-overlay hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="intro-title">
    <div class="intro-content">
      <img src="assets/logo.png" alt="Frame by Karam Logo" class="intro-logo" />
      
      <h1 id="intro-title" class="intro-title" style="font-family: 'Playfair Display', serif;">
        Mirrorbooth reservation
      </h1>
      
      <button id="intro-start-btn" class="intro-start-btn" aria-label="Start here">
        Start here
      </button>
    </div>
  </div>

<main class="relative w-full max-w-[430px] h-[100dvh] sm:h-[850px] bg-[#0a0a0a] sm:rounded-[38px] shadow-2xl overflow-hidden flex flex-col mx-auto luxury-frame-container">
<div class="luxury-frame-inner pointer-events-none absolute inset-0 z-[9000] sm:rounded-[38px]"></div>

<section class="w-full h-full overflow-y-auto p-5 pb-24 relative z-10 custom-scrollbar">
<div class="w-full mx-auto relative flex flex-col">

<header class="relative flex flex-col items-center pt-6 pb-4 border-b border-white/10 mb-6">
<div id="lang-switch" class="absolute top-2 right-0 flex items-center gap-2 z-50"></div>
<img src="assets/logo.png" alt="Frame by Karam" class="h-20 object-contain" />
</header>

<div id="step-dots" class="flex items-center justify-between w-full px-2 mb-6"></div>

<div class="text-center mb-6">
<h1 id="step-title" tabindex="-1" class="text-2xl md:text-3xl font-semibold outline-none text-white tracking-wide" style="font-family: 'Playfair Display', serif;"></h1>
<p id="step-subtitle" class="text-xs text-white/50 mt-2 uppercase tracking-widest"></p>
</div>

        <div id="step-content" class="mt-6"></div>

        <div class="mt-6 flex items-center justify-between gap-3 pb-8">
          <button id="btn-prev" class="px-4 py-3 rounded-2xl glass text-white/90 hover:text-white flex items-center gap-2">
            <i data-lucide="chevron-left" class="w-5 h-5"></i>
            <span id="prev-label">Previous</span>
          </button>

          <button id="btn-next" class="px-4 py-3 rounded-2xl gold-btn font-semibold flex items-center gap-2">
            <span id="next-label">Next</span>
            <i data-lucide="chevron-right" class="w-5 h-5"></i>
          </button>
        </div>

      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
